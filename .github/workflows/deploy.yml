name: Deploy to TimeWeb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload files via curl FTP
        run: |
          shopt -s globstar
          for f in **/*; do
            if [[ -f "$f" && "$f" != .git/* && "$f" != .github/* && "$f" != .gitignore && "$f" != README.md ]]; then
              dir=$(dirname "$f")
              curl -s --ftp-create-dirs -T "$f" "ftp://vh466.timeweb.ru/public_html/$f" --user "$FTP_USER:$FTP_PASS"
            fi
          done
        env:
          FTP_USER: ci026152
          FTP_PASS: N?sp1!N574cT
